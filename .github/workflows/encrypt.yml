name: Encrypt and publish

on:
  push:
    branches: [main]

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt protected pages
        run: |
          staticrypt marketing.html marketing-ai-b2b.html \
            --password "${{ secrets.PAGE_PASSWORD }}" \
            --directory . \
            --remember 0

      - name: Push to live branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git stash
          git fetch origin
          git checkout -B live
          git stash pop
          git add -A
          git commit -m "Publish encrypted site"
          git push origin live --force
