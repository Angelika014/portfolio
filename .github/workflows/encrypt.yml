name: Encrypt protected pages

on:
  push:
    branches: [main]

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt marketing.html
        run: |
          staticrypt marketing.html \
            --password "${{ secrets.PAGE_PASSWORD }}" \
            --directory . \
            --remember 0

      - name: Commit encrypted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add marketing.html
          git diff --staged --quiet || git commit -m "Auto-encrypt protected pages"
          git push
